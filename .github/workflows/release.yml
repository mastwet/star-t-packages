name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - jdk-8
          - jdk-17
          - jdk-21
          - tomcat
          - tomcat9
          - redis
          - mysql
          - nginx
          - php
          - postgresql
          - rabbitmq
    steps:
      - uses: actions/checkout@v4

      - name: Build .star package
        id: build
        shell: pwsh
        run: |
          $service = "${{ matrix.service }}"
          $servicePath = "services/$service"

          if (-not (Test-Path $servicePath)) {
            Write-Error "Service not found: $servicePath"
            exit 1
          }

          $meta = Get-Content "$servicePath/meta.json" -Raw | ConvertFrom-Json
          $version = $meta.version
          $packageName = "$($meta.id)-$version-$($meta.platform).star"

          Write-Host "Building: $packageName"
          & "$servicePath/build.ps1" -Version $version -OutputDir "dist"

          $file = Get-ChildItem "dist/*.star" | Select-Object -First 1
          $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
          Write-Host "SHA256: sha256:$hash"
          Write-Host "Size:   $([math]::Round($file.Length / 1MB, 1)) MB"

          echo "package_name=$($file.Name)" >> $env:GITHUB_OUTPUT
          echo "sha256=sha256:$hash" >> $env:GITHUB_OUTPUT
          echo "size_bytes=$($file.Length)" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.package_name }}
          path: dist/*.star
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          echo "## STAR-T Service Packages" > notes.md
          echo "" >> notes.md
          echo "### Included Services" >> notes.md
          echo "" >> notes.md
          echo "| Service | Package | Size | SHA256 |" >> notes.md
          echo "|---------|---------|------|--------|" >> notes.md

          for dir in artifacts/*/; do
            pkg=$(basename "$dir")
            file=$(find "$dir" -name "*.star" | head -1)
            if [ -n "$file" ]; then
              size=$(stat --format="%s" "$file")
              size_mb=$(echo "scale=1; $size / 1048576" | bc)
              hash=$(sha256sum "$file" | cut -d' ' -f1)
              echo "| ${pkg%%-*} | \`$pkg\` | ${size_mb}MB | \`${hash:0:12}...\` |" >> notes.md
            fi
          done

          echo "" >> notes.md
          echo "### Installation" >> notes.md
          echo "" >> notes.md
          echo "Download the \`.star\` files you need and import them into STAR-T:" >> notes.md
          echo "1. Open STAR-T" >> notes.md
          echo '2. Go to **Settings → Import Package** or drag the `.star` file into the window' >> notes.md
          echo "3. The service will be installed and ready to use" >> notes.md
          echo "" >> notes.md
          echo "### Registry" >> notes.md
          echo "" >> notes.md
          echo "Service registry: \`registry.json\` in this repository" >> notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: artifacts/**/*.star
          fail_on_unmatched_files: false
          generate_release_notes: true
